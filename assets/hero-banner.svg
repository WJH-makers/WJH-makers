<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="t d">
  <title id="t">WJH-makers · Engineering Gazette Banner</title>
  <desc id="d">Warm cream paper banner with terracotta accents, satellite, CPU, and terminal motifs.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F0"/>
      <stop offset="45%" stop-color="#FAF5ED"/>
      <stop offset="100%" stop-color="#F3E8DC"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A07A"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <linearGradient id="inkfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1917" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1C1917" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#D6CFC4" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1C1917" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 52px 'Segoe UI', system-ui, sans-serif; fill: #1C1917; }
      .sub { font: 600 18px 'Segoe UI', system-ui, sans-serif; fill: #5C5A55; }
      .tag { font: 700 13px 'Cascadia Code', 'Fira Code', monospace; fill: #FAF9F5; }
      .mono { font: 600 14px 'Cascadia Code', 'Fira Code', monospace; fill: #3D3D3A; }
      .float { animation: f 4.2s ease-in-out infinite; }
      .float2 { animation: f2 5s ease-in-out infinite; }
      .blink { animation: b 1.1s steps(2) infinite; }
      .spin { animation: s 12s linear infinite; transform-origin: 980px 118px; }
      .dash { stroke-dasharray: 8 10; animation: d 2.5s linear infinite; }
      .glow { animation: g 2.8s ease-in-out infinite; }
      @keyframes f { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes f2 { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(7px) rotate(2deg)} }
      @keyframes b { 0%,48%{opacity:1} 50%,100%{opacity:0} }
      @keyframes s { to { transform: rotate(360deg); } }
      @keyframes d { to { stroke-dashoffset: -36; } }
      @keyframes g { 0%,100%{opacity:.55} 50%{opacity:1} }
    </style>
  </defs>

  <!-- paper -->
  <rect width="1200" height="360" rx="28" fill="url(#sky)"/>
  <rect width="1200" height="360" rx="28" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="60" fill="url(#inkfade)"/>

  <!-- top masthead bar -->
  <rect x="36" y="22" width="1128" height="36" rx="10" fill="#1C1917"/>
  <text x="56" y="45" class="tag" fill="#F5E6D8">THE WJH ENGINEERING GAZETTE</text>
  <text x="980" y="45" class="tag" fill="#D97757">VOL. 2026 · UTC+8</text>

  <!-- left title card -->
  <g filter="url(#soft)">
    <rect x="48" y="80" width="560" height="230" rx="22" fill="#FFFCFA" stroke="#E8DFD4" stroke-width="2"/>
    <rect x="48" y="80" width="10" height="230" rx="4" fill="url(#coral)"/>
    <text x="82" y="140" class="title">WJH-makers</text>
    <text x="82" y="176" class="sub">万佳泓 · 武汉大学 CS · 把点子做成能上线的东西</text>
    <text x="82" y="214" class="mono">$ ship --reproducible --testable --explainable</text>
    <rect x="82" y="236" width="14" height="22" fill="#D97757" class="blink"/>
    <!-- chips -->
    <g transform="translate(82,276)">
      <rect width="88" height="26" rx="13" fill="#D97757"/><text x="44" y="18" text-anchor="middle" class="tag">RS-VQA</text>
      <rect x="98" width="72" height="26" rx="13" fill="#2D5DA1"/><text x="134" y="18" text-anchor="middle" class="tag">AI</text>
      <rect x="180" width="88" height="26" rx="13" fill="#5C6B4A"/><text x="224" y="18" text-anchor="middle" class="tag">Systems</text>
      <rect x="278" width="96" height="26" rx="13" fill="#1C1917"/><text x="326" y="18" text-anchor="middle" class="tag">Full-stack</text>
    </g>
  </g>

  <!-- floating satellite -->
  <g class="float" transform="translate(700,95)">
    <ellipse cx="70" cy="48" rx="54" ry="22" fill="#E8DFD4"/>
    <rect x="40" y="28" width="60" height="36" rx="8" fill="#FFF" stroke="#1C1917" stroke-width="3"/>
    <circle cx="70" cy="46" r="10" fill="#2D5DA1" class="glow"/>
    <line x1="20" y1="46" x2="40" y2="46" stroke="#1C1917" stroke-width="3" class="dash"/>
    <line x1="100" y1="46" x2="120" y2="46" stroke="#1C1917" stroke-width="3" class="dash"/>
    <text x="70" y="92" text-anchor="middle" class="mono" font-size="12">remote sensing</text>
  </g>

  <!-- terminal window -->
  <g class="float2" filter="url(#soft)" transform="translate(860,150)">
    <rect width="280" height="160" rx="14" fill="#1C1917"/>
    <circle cx="22" cy="20" r="6" fill="#E76F51"/><circle cx="42" cy="20" r="6" fill="#E9C46A"/><circle cx="62" cy="20" r="6" fill="#A3B18A"/>
    <text x="20" y="56" fill="#A3B18A" font-family="Cascadia Code, Fira Code, monospace" font-size="13">~/ship</text>
    <text x="20" y="80" fill="#F5E6D8" font-family="Cascadia Code, Fira Code, monospace" font-size="13">&gt; train · serve · deploy</text>
    <text x="20" y="104" fill="#D97757" font-family="Cascadia Code, Fira Code, monospace" font-size="13">&gt; learning in public</text>
    <text x="20" y="128" fill="#6A9BCC" font-family="Cascadia Code, Fira Code, monospace" font-size="13">&gt; wwjjhh.online</text>
    <rect x="20" y="140" width="10" height="14" fill="#D97757" class="blink"/>
  </g>

  <!-- gear -->
  <g class="spin">
    <circle cx="980" cy="118" r="22" fill="none" stroke="#D97757" stroke-width="5"/>
    <circle cx="980" cy="118" r="8" fill="#D97757"/>
    <path d="M980 90 v12 M980 134 v12 M952 118 h12 M996 118 h12 M960 98 l8 8 M992 130 l8 8 M992 98 l-8 8 M960 130 l-8 8" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- bottom strip -->
  <rect x="48" y="328" width="1104" height="3" rx="2" fill="#E8DFD4"/>
  <text x="600" y="348" text-anchor="middle" class="mono" font-size="12" fill="#8A8880">reproducible · testable · shippable · fun</text>
</svg>
