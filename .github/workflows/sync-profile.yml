name: Sync Profile README

# 自动把公开仓库同步进个人主页 README（AUTO 区块）
on:
  schedule:
    # 每 6 小时（UTC）扫一次公开仓库
    - cron: "20 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    # 其他仓库可触发：gh api repos/WJH-makers/WJH-makers/dispatches -f event_type=sync-profile
    types: [sync-profile]
  push:
    branches: [main]
    paths:
      - "config/profile.yml"
      - "scripts/generate_profile_readme.py"
      - "scripts/requirements.txt"
      - ".github/workflows/sync-profile.yml"

permissions:
  contents: write

concurrency:
  group: sync-profile
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Generate README from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_profile_readme.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore(profile): auto-sync project table from public repos"
            git push
          fi
