name: README Health
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 1 * * 1'
permissions:
  contents: read
jobs:
  readme-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Check profile README
        run: python scripts/check-profile-readme.py
